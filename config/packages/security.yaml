security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: "auto"

    # FIX 1 : Hiérarchie des rôles (Crucial pour que l'Admin accède au Dashboard user)
    role_hierarchy:
        ROLE_ADMIN:       ROLE_USER
        ROLE_SUPER_ADMIN: [ROLE_ADMIN, ROLE_ALLOWED_TO_SWITCH]

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\AppAuthenticator

            # --- CONFIGURATION 2FA ---
            two_factor:
                auth_form_path: 2fa_login
                check_path: 2fa_login_check
            # ---------------------------

            logout:
                path: app_logout
                target: app_home

            remember_me:
                secret: "%kernel.secret%"
                lifetime: 604800
                path: /
                always_remember_me: true

    access_control:
        # --- 1. ACCÈS PUBLICS ---
        - { path: ^/login$, roles: PUBLIC_ACCESS }
        - { path: ^/register$, roles: PUBLIC_ACCESS }
        - { path: ^/verify/email, roles: PUBLIC_ACCESS }
        
        # FIX 2 : Sécurité 2FA (Rôle spécial obligatoire pour le tunnel de vérification)
        - { path: ^/2fa, roles: IS_AUTHENTICATED_2FA_IN_PROGRESS }

        # --- 2. RÈGLES ADMIN ---
        # FIX 3 : On protège TOUTE l'interface admin, pas seulement le 2FA
        - { path: ^/admin/2fa-, roles: ROLE_ADMIN }
        - { path: ^/admin, roles: ROLE_ADMIN }

        # --- 3. GESTION CATALOGUE ---
        - { path: ^/exercise/new, roles: ROLE_ADMIN }
        - { path: ^/exercise/\d+/edit, roles: ROLE_ADMIN }
        - { path: ^/exercise/\d+$, roles: ROLE_ADMIN, methods: [POST] }

        # --- 4. RÈGLES UTILISATEURS CONNECTÉS ---
        - { path: ^/exercise, roles: ROLE_USER }
        - { path: ^/workout, roles: ROLE_USER }
        - { path: ^/profile, roles: ROLE_USER }
        - { path: ^/dashboard, roles: ROLE_USER }

        # --- 5. ACCÈS ACCUEIL ---
        - { path: ^/$, roles: PUBLIC_ACCESS }