security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\AppAuthenticator
            
            # --- AJOUT DE LA 2FA ICI ---
            two_factor:
                auth_form_path: 2fa_login    # Route d'affichage du formulaire
                check_path: 2fa_login_check # Route de validation du code
            # ---------------------------

            logout:
                path: app_logout
                target: app_home

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
                always_remember_me: true

    access_control:
        # 1. Autoriser l'accès au formulaire 2FA pour les gens en cours de connexion
        # IS_AUTHENTICATED_2FA_IN_PROGRESS est un rôle spécial du bundle
        - { path: ^/2fa, roles: IS_AUTHENTICATED_2FA_IN_PROGRESS }

        # 2. Tes règles existantes
        - { path: ^/exercise/new, roles: ROLE_ADMIN }
        - { path: ^/exercise/\d+/edit, roles: ROLE_ADMIN }
        - { path: ^/exercise/\d+$, roles: ROLE_ADMIN, methods: [POST] }
        
        - { path: ^/exercise, roles: ROLE_USER }
        - { path: ^/workout, roles: ROLE_USER }
        
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }

        # Sécuriser la page d'activation 2FA sur le profil
        - { path: ^/profile/2fa, roles: ROLE_USER }