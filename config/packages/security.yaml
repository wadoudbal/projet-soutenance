security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\AppAuthenticator
            
            # --- CONFIGURATION 2FA ---
            # On s'assure que le bundle est bien branché sur le firewall principal
            two_factor:
                auth_form_path: 2fa_login
                check_path: 2fa_login_check
            # ---------------------------

            logout:
                path: app_logout
                target: app_home

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
                always_remember_me: true

    access_control:
        # --- 1. ACCÈS PUBLICS (DOIVENT ÊTRE EN HAUT) ---
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/2fa, roles: PUBLIC_ACCESS }
        - { path: ^/verify/email, roles: PUBLIC_ACCESS } # Ajouté pour ton système de vérification
        
        # --- 2. RÈGLES ADMIN ---
        - { path: ^/admin/2fa/setup, roles: ROLE_ADMIN }
        - { path: ^/exercise/new, roles: ROLE_ADMIN }
        - { path: ^/exercise/\d+/edit, roles: ROLE_ADMIN }
        - { path: ^/exercise/\d+$, roles: ROLE_ADMIN, methods: [POST] }
        
        # --- 3. RÈGLES UTILISATEURS CONNECTÉS ---
        - { path: ^/exercise, roles: ROLE_USER }
        - { path: ^/workout, roles: ROLE_USER }
        - { path: ^/profile, roles: ROLE_USER }
        - { path: ^/dashboard, roles: ROLE_USER } # Ajouté selon ta redirection de succès
        
        # --- 4. ACCÈS ACCUEIL (EN DERNIER) ---
        - { path: ^/$, roles: PUBLIC_ACCESS }